<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaseVector AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    color: black;
}
    input, select, button {
    font-size: 16px;
}
    .toggle button {
    color: black;
}
    input, select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 16px;
    color: black;
    background: white;
}
    select {
    appearance: none;
}

/* FULL SCREEN LAYOUT FIX */
.app {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 420px;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    object-fit: cover;
}

.title {
    font-weight: bold;
    font-size: 18px;
}

.desc {
    font-size: 13px;
    margin: 15px 0 25px;
    line-height: 1.4;
}

/* CARD */
.card {
    border-radius: 12px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 16px; /* IMPORTANT: spacing system */
}

/* FORM GROUP (fix spacing problem) */
.form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
}

/* TOGGLES */
.toggle {
    display: flex;
    gap: 10px;
}

.toggle button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    background: white;
    cursor: pointer;
}

.toggle button.active {
    background: #123611;
    color: white;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.primary {
    background: #123611;
    color: white;
}

.primary:active {
    background: #0c240c;
}

.secondary {
    background: #eee;
}

/* RESULT */
.result {
    display: none;
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    background: #f9f9f9;
    font-size: 13px;
}

.red { color: red; font-weight: bold; }
.green { color: green; font-weight: bold; }

/* PAGE SYSTEM */
.page {
    display: none;
}

.page.active {
    display: block;
}

/* spacing between pages */
.page h3 {
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="app">
<div class="container">

    <!-- HEADER -->
    <div class="header">
        <img src="logo.png" class="logo">
        <div class="title">CaseVector AI</div>
    </div>

    <div class="desc">
        CaseVector AI analyzes your firm, finds where you're losing money and shows how to fix it.
    </div>

    <!-- PAGE 1 -->
    <div id="page1" class="page active">

        <div class="card">

            <div class="form-group">
                <label>How many potential clients (leads) do you get per month?</label>
                <input id="leads" type="number">
            </div>

            <div class="form-group">
                <label>What percentage of leads become paying clients?</label>
                <input id="stay" type="number">
            </div>

            <div class="form-group">
                <label>Do you respond to leads within 5 minutes?</label>
                <div class="toggle">
                    <button onclick="setYesNo(this,'fastResponse',true)">Yes</button>
                    <button onclick="setYesNo(this,'fastResponse',false)">No</button>
                </div>
            </div>

            <div class="form-group">
                <label>Can your system capture leads after working hours?</label>
                <div class="toggle">
                    <button onclick="setYesNo(this,'afterHours',true)">Yes</button>
                    <button onclick="setYesNo(this,'afterHours',false)">No</button>
                </div>
            </div>

            <div class="form-group">
                <label>How much does a typical client spend ($)?</label>
                <input id="value" type="number">
            </div>

            <button class="btn secondary" onclick="resetForm()">Reset</button>
           <button class="btn primary" onclick="validatePage1()">Done</button>

        </div>

        <div class="result" id="resultBox"></div>
        <div id="loadingBox" style="display:none; text-align:center; margin-top:15px;">
    <div style="margin-bottom:10px;">Analyzing your firm...</div>

    <div style="width:100%; height:8px; background:#eee; border-radius:10px; overflow:hidden;">
        <div id="loadingBar" style="
            width:0%;
            height:100%;
            background:#123611;
            transition: width 2s ease;
        "></div>
    </div>
</div>

        <button class="btn primary" id="requestBtn" style="display:none;" onclick="goToPage(2)">
            Send me the full breakdown
        </button>
    </div>

    <!-- PAGE 2 -->
    <div id="page2" class="page">

        <h3>Verify that you're a real firm</h3>

        <div class="card">

            <div class="form-group">
                <label>Full Name</label>
                <input id="name" type="text" name="name" autocomplete="name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input id="email" type="email" name="email" autocomplete="email">
            </div>

            <button class="btn primary" onclick="validatePage2()">Next</button>

        </div>
    </div>

    <!-- PAGE 3 -->
    <div id="page3" class="page">

        <h3>Final verification</h3>

        <div class="card">

            <div class="form-group">
                <label>Firm Name</label>
                <input id="firm" type="text" name="organization" autocomplete="organization">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input id="phone" type="tel" name="phone" autocomplete="tel">
            </div>

            <div class="form-group">
                <label>Position</label>
                <select id="role">
                    <option>Partner</option>
                    <option>Senior</option>
                    <option>Owner</option>
                    <option>Other</option>
                </select>

    <div style="width:100%; height:8px; background:#eee; border-radius:10px; overflow:hidden;">
        <div id="sendingBar" style="
            width:0%;
            height:100%;
            background:#123611;
            transition: width 2s ease;
        "></div>
    </div>
</div>
            </div>

            <div class="form-group">
                <label>Monthly Revenue</label>
                <select id="revenue">
                    <option><$50k</option>
                    <option>$50k-$200k</option>
                    <option>$200k-$600k</option>
                    <option>>$600k</option>
                </select>
                       <div id="sendingBox" style="display:none; text-align:center; margin-top:20px;">
    <div style="margin-bottom:10px;">Sending your data...</div>
            </div>

          <button class="btn primary" onclick="validatePage3()">Get Results</button>

        </div>
    </div>

</div>
</div>

<script>
let data = {
    fastResponse: null,
    afterHours: null
};

function setYesNo(btn, key, value) {
    data[key] = value;
    let siblings = btn.parentNode.querySelectorAll('button');
    siblings.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function resetForm() {
    location.reload();
}

/* PAGE SYSTEM */
function goToPage(n) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page' + n).classList.add('active');
}
function formatMoney(n) {
    return Math.abs(n).toLocaleString("en-US");
}
/* CALC */
    function calculate() {

    document.getElementById("loadingBox").style.display = "block";
    document.getElementById("resultBox").style.display = "none";
    document.getElementById("requestBtn").style.display = "none";

    // animate bar
    setTimeout(() => {
        document.getElementById("loadingBar").style.width = "100%";
    }, 100);

    // delay real calculation
    setTimeout(() => {

        let L = Number(document.getElementById("leads").value || 0);
        let S = Number(document.getElementById("stay").value || 0) / 100;
        let V = Number(document.getElementById("value").value || 0);

        S = Math.min(1, Math.max(0, S));

        let C = 0.25;
        let S_opt = 0.85;
        let C_opt = 0.40;

        let actual = (L * S * C) * V;
        let ideal = (L * S_opt * C_opt) * V;

        let loss = Math.max(0, ideal - actual);
        let saved = loss * 0.75;

        let wastedLeadsLoss = loss * (1 - S);
        let missedOppLoss = loss - wastedLeadsLoss;

        function formatMoney(n) {
            return Math.abs(n).toLocaleString("en-US");
        }

        document.getElementById("loadingBox").style.display = "none";

        document.getElementById("resultBox").style.display = "block";
        document.getElementById("resultBox").innerHTML = `
CaseVector AI analysis:

<br><br>

After analyzing your firm and comparing it with industry data, CaseVector AI found:

<br><br>

Your firm is losing approximately 
<span class="red">-$${formatMoney(loss)}</span> per year due to inefficiencies in your system.

<br><br>

<strong>Here’s the breakdown</strong>

<br><br>

• Top leak: <span class="red">-$${formatMoney(wastedLeadsLoss)}</span>  
(money lost because you're wasting leads)

<br>

• Bottom leak: <span class="red">-$${formatMoney(missedOppLoss)}</span>  
(money lost because you missed opportunities)

<br><br>

You could recover up to 
<span class="green">+$${formatMoney(saved)}</span> per year if these issues are fixed.

<br><br>

CaseVector AI has created a FREE full breakdown showing exactly where these losses come from and how to fix them.

<br><br>
`;

        document.getElementById("requestBtn").style.display = "block";

        sendToBackend({L,S,V,data});

    }, 2000); // 2 seconds delay
}
function submitAll() {

    let payload = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        firm: document.getElementById("firm").value,
        phone: document.getElementById("phone").value,
        role: document.getElementById("role").value,
        revenue: document.getElementById("revenue").value,
        funnelData: data
    };

    // SHOW LOADING UI
    document.getElementById("sendingBox").style.display = "block";

    // animate bar
    setTimeout(() => {
        document.getElementById("sendingBar").style.width = "100%";
    }, 100);

    // SEND DATA
    fetch("YOUR_GOOGLE_SCRIPT_URL", {
        method: "POST",
        body: JSON.stringify(payload)
    });

    // DELAY THEN REDIRECT
    setTimeout(() => {
        window.location.href = "https://www.casevector.pro";
    }, 2000);
    document.querySelector("#page3 .card").style.display = "none";
}

    function showError(input, message) {
    input.style.border = "1px solid red";
    input.placeholder = message;
}

function clearError(input) {
    input.style.border = "1px solid #ccc";
}

/* PAGE 1 */
function validatePage1() {

    let leads = document.getElementById("leads");
    let stay = document.getElementById("stay");
    let value = document.getElementById("value");

    let valid = true;

    if (!leads.value) {
        showError(leads, "Enter leads");
        valid = false;
    } else clearError(leads);

    if (!stay.value || stay.value > 100) {
        showError(stay, "0 - 100%");
        valid = false;
    } else clearError(stay);

    if (!value.value) {
        showError(value, "Enter value");
        valid = false;
    } else clearError(value);

    if (data.fastResponse === null || data.afterHours === null) {
        alert("Please answer all questions");
        valid = false;
    }

    if (!valid) return;

    calculate();
}

/* PAGE 2 */
function validatePage2() {

    let name = document.getElementById("name");
    let email = document.getElementById("email");

    let valid = true;

    if (!name.value) {
        showError(name, "Enter name");
        valid = false;
    } else clearError(name);

    if (!email.value || !email.value.includes("@")) {
        showError(email, "Valid email");
        valid = false;
    } else clearError(email);

    if (!valid) return;

    goToPage(3);
}

/* PAGE 3 */
function validatePage3() {

    let firm = document.getElementById("firm");
    let phone = document.getElementById("phone");

    let valid = true;

    if (!firm.value) {
        showError(firm, "Enter firm");
        valid = false;
    } else clearError(firm);

    if (!phone.value) {
        showError(phone, "Enter phone");
        valid = false;
    } else clearError(phone);

    if (!valid) return;

    submitAll();
}
    function sendToBackend(payload) {
    fetch("YOUR_GOOGLE_SCRIPT_URL", {
        method: "POST",
        body: JSON.stringify(payload)
    });
}

</script>

</body>
</html>
